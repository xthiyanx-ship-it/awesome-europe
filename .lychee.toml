### Lychee link checker configuration

# Accept SSL issues (common with EU government sites)
insecure = true

# Exclude shields.io badge URLs (generated, not real content links)
exclude = [
  "img.shields.io",
]

# Timeout per request (seconds)
timeout = 30

# Max concurrent requests
max_concurrency = 8

# Accept these status codes (some sites return 403 to bots)
accept = [200, 204, 301, 302, 403, 429]

# Max retries
max_retries = 2
