<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <clipPath id="rounded">
      <rect width="800" height="200" rx="16" ry="16"/>
    </clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#14141f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCC00" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#003399" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFCC00" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <mask id="fade-left">
      <linearGradient id="fl" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#fff"/>
        <stop offset="100%" stop-color="#000"/>
      </linearGradient>
      <rect width="120" height="200" fill="url(#fl)"/>
    </mask>
    <mask id="fade-right">
      <linearGradient id="fr" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#000"/>
        <stop offset="100%" stop-color="#fff"/>
      </linearGradient>
      <rect x="680" width="120" height="200" fill="url(#fr)"/>
    </mask>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Dark base -->
    <rect width="800" height="200" fill="url(#bg)"/>

    <!-- Subtle grid pattern -->
    <g opacity="0.04" stroke="#fff" stroke-width="0.5" fill="none">
      <line x1="0" y1="0" x2="0" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
      <line x1="80" y1="0" x2="80" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
      <line x1="160" y1="0" x2="160" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
      <line x1="240" y1="0" x2="240" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/>
      <line x1="320" y1="0" x2="320" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/>
      <line x1="400" y1="0" x2="400" y2="200"/><line x1="440" y1="0" x2="440" y2="200"/>
      <line x1="480" y1="0" x2="480" y2="200"/><line x1="520" y1="0" x2="520" y2="200"/>
      <line x1="560" y1="0" x2="560" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/>
      <line x1="640" y1="0" x2="640" y2="200"/><line x1="680" y1="0" x2="680" y2="200"/>
      <line x1="720" y1="0" x2="720" y2="200"/><line x1="760" y1="0" x2="760" y2="200"/>
      <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
      <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    </g>

    <!-- EU blue on left side, fading into dark -->
    <g mask="url(#fade-left)" opacity="0.5">
      <rect x="0" y="0" width="120" height="200" fill="#003399"/>
      <!-- Stars on left -->
      <g fill="#FFCC00" opacity="0.8">
        <circle cx="40" cy="40" r="3"/><circle cx="60" cy="30" r="2.5"/>
        <circle cx="25" cy="70" r="2"/><circle cx="70" cy="65" r="2.5"/>
        <circle cx="35" cy="110" r="3"/><circle cx="65" cy="100" r="2"/>
        <circle cx="45" cy="145" r="2.5"/><circle cx="20" cy="160" r="2"/>
        <circle cx="75" cy="140" r="2"/><circle cx="50" cy="175" r="2.5"/>
      </g>
    </g>

    <!-- EU blue on right side, fading into dark -->
    <g mask="url(#fade-right)" opacity="0.5">
      <rect x="680" y="0" width="120" height="200" fill="#003399"/>
      <!-- Stars on right -->
      <g fill="#FFCC00" opacity="0.8">
        <circle cx="730" cy="35" r="2.5"/><circle cx="760" cy="50" r="3"/>
        <circle cx="720" cy="80" r="2"/><circle cx="755" cy="95" r="2.5"/>
        <circle cx="740" cy="130" r="3"/><circle cx="770" cy="115" r="2"/>
        <circle cx="725" cy="155" r="2.5"/><circle cx="765" cy="165" r="2"/>
        <circle cx="745" cy="180" r="2"/><circle cx="715" cy="40" r="2"/>
      </g>
    </g>

    <!-- Blurred color orbs -->
    <ellipse cx="120" cy="160" rx="180" ry="120" fill="#003399" opacity="0.2" filter="url(#blur1)"/>
    <ellipse cx="680" cy="40" rx="200" ry="130" fill="#FFCC00" opacity="0.12" filter="url(#blur1)"/>
    <ellipse cx="500" cy="180" rx="120" ry="80" fill="#003399" opacity="0.08" filter="url(#blur2)"/>

    <!-- Diagonal accent lines -->
    <line x1="580" y1="0" x2="800" y2="130" stroke="#FFCC00" stroke-width="1" opacity="0.12"/>
    <line x1="600" y1="0" x2="800" y2="118" stroke="#003399" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="140" x2="220" y2="200" stroke="#003399" stroke-width="1" opacity="0.12"/>
    <line x1="0" y1="155" x2="190" y2="200" stroke="#FFCC00" stroke-width="1" opacity="0.1"/>

    <!-- Central glow -->
    <rect width="800" height="200" fill="url(#glow)"/>

    <!-- EU star circle (12 stars) centered -->
    <g transform="translate(400, 100)" fill="#FFCC00" opacity="0.15">
      <circle cx="0" cy="-55" r="3.5"/>
      <circle cx="27.5" cy="-47.6" r="3.5"/>
      <circle cx="47.6" cy="-27.5" r="3.5"/>
      <circle cx="55" cy="0" r="3.5"/>
      <circle cx="47.6" cy="27.5" r="3.5"/>
      <circle cx="27.5" cy="47.6" r="3.5"/>
      <circle cx="0" cy="55" r="3.5"/>
      <circle cx="-27.5" cy="47.6" r="3.5"/>
      <circle cx="-47.6" cy="27.5" r="3.5"/>
      <circle cx="-55" cy="0" r="3.5"/>
      <circle cx="-47.6" cy="-27.5" r="3.5"/>
      <circle cx="-27.5" cy="-47.6" r="3.5"/>
    </g>

    <!-- Small decorative dots -->
    <circle cx="90" cy="30" r="1.5" fill="#FFCC00" opacity="0.3"/>
    <circle cx="710" cy="170" r="1.5" fill="#003399" opacity="0.4"/>
    <circle cx="200" cy="170" r="1" fill="#FFCC00" opacity="0.2"/>
    <circle cx="650" cy="25" r="1" fill="#FFCC00" opacity="0.25"/>

    <!-- Title -->
    <text x="400" y="92" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" fill="#fff" font-weight="700" letter-spacing="2">awesome-europe</text>

    <!-- Accent bar under title -->
    <rect x="310" y="104" width="180" height="2" rx="1" fill="#FFCC00" opacity="0.5"/>

    <!-- Subtitle -->
    <text x="400" y="134" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" font-weight="300" letter-spacing="3.5">OPEN SOURCE SOFTWARE FOR EUROPE</text>

    <!-- Top border accent -->
    <rect width="800" height="2" fill="#003399" opacity="0.6"/>
    <rect x="0" y="0" width="400" height="2" fill="#FFCC00" opacity="0.4"/>
  </g>
</svg>
